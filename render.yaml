services:
  - type: web
    name: comutitres-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build --workspace backend
    startCommand: npm run start --workspace backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: METRICS_TOKEN
        sync: false
      - key: CORS_ORIGIN
        sync: false
