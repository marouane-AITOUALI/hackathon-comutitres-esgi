name: comutitres

services:
  backend:
    build:
      context: ./backend
      target: development
    env_file:
      - ./backend/.env
    ports:
      - "${API_PORT:-3001}:3000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  backoffice:
    build:
      context: ./backoffice
      target: development
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-3001}/api
    ports:
      - "5174:5173"
    volumes:
      - ./backoffice:/app
      - backoffice_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_node_modules:
  frontend_node_modules:
  backoffice_node_modules:
