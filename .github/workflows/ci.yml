name: CI

on:
  pull_request:
  push:

jobs:
  lint-build:
    name: Lint and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux native bindings
        run: npm install --workspace frontend --workspace backoffice @rolldown/binding-linux-x64-gnu@1.0.3 lightningcss-linux-x64-gnu@1.32.0 --no-save --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
